services:
  webhooks:
    build: .
    container_name: webhooks
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - GOOGLE_KEY_PATH=/google_keys/google_boosters_finance_key.json
    volumes:
      - ./google_keys:/google_keys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: fastdashboards_fastdashboards-network
    external: true
